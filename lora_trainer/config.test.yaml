# ════════════════════════════════════════════════════════════════════
# Смоук-тест: быстрый прогон для замера скорости и проверки, что всё цело.
# Наследует config.yaml (твою модель, корпус и т.д.) и меняет только
# тестовые параметры. Запуск:  python train.py --config config.test.yaml
# ════════════════════════════════════════════════════════════════════

extends: config.yaml

data:
  max_seq_len: 1024             # короче -> каждый шаг быстрее

train:
  epochs: 0.05                  # прогнать пару десятков примеров, не весь корпус
  per_device_batch_size: 1
  grad_accum: 1                 # шаг = один пример -> скорость видно напрямую
  logging_steps: 1              # печатать loss на каждом шаге
  eval_strategy: "no"
  resume: false                 # не цепляться к старым чекпоинтам на тестах
